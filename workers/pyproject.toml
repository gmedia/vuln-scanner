[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
addopts = "--cov=. --cov-branch --cov-report=term-missing --cov-report=html --cov-report=json --cov-fail-under=76"

[tool.coverage.run]
source = ["."]
omit = ["tests/*", "health_server.py", "celery_app.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.coverage.html]
directory = "coverage"

[tool.coverage.json]
output = "coverage-report.json"

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["tests/"]
explicit_package_bases = true
