name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  API_KEY: dev-api-key-change-me

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check --output-format=github

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run eslint
        run: npm run lint

  e2e-tests:
    needs: [python-tests, frontend-typecheck, frontend-unit-tests, python-lint, frontend-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install frontend dependencies (pre-Docker — avoid root-owned node_modules)
        run: npm ci
        working-directory: frontend

      - name: Start full stack via Docker Compose
        run: docker compose -f docker-compose.yml up -d --wait

      - name: Seed E2E test data
        run: docker compose -f docker-compose.yml exec -T backend python -m scripts.seed_e2e

      - name: Install Playwright with Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: "http://localhost:5173"

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results / traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Dump service logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.yml logs backend --tail=100
          docker compose -f docker-compose.yml logs frontend --tail=50
          docker compose -f docker-compose.yml logs postgres --tail=30
          docker compose -f docker-compose.yml logs worker_ip --tail=30
          docker compose -f docker-compose.yml logs worker_domain --tail=30

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [python-tests, frontend-typecheck, frontend-unit-tests, python-lint, frontend-lint, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main
            docker compose down
            docker compose up -d --build --wait
            echo "Deploy completed successfully"
