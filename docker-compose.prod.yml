# Production docker-compose — no nginx container (host nginx handles SSL + reverse proxy).
# Services expose internal ports only. Host nginx proxies to frontend:80 and backend:8000.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vuln-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vuln_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-vuln_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vuln-net

  redis:
    image: redis:8-alpine
    container_name: vuln-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vuln-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vs.appmedia.id}
      API_KEY: ${API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-30}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-VulnScanner <noreply@vs.appmedia.id>}
      FRONTEND_URL: ${FRONTEND_URL:-https://vs.appmedia.id}
    volumes:
      - scan_data:/tmp/scans
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - vuln-net

  worker_ip:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-ip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      NVD_API_KEY: ${NVD_API_KEY:-}
      CELERY_QUEUE: ip_scan
      CELERY_CONCURRENCY: 2
    volumes:
      - scan_data:/tmp/scans
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vuln-net

  worker_domain:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-domain
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      CELERY_QUEUE: domain_scan
      CELERY_CONCURRENCY: 2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vuln-net

  worker_mobile:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-mobile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      CELERY_QUEUE: mobile_scan
      CELERY_CONCURRENCY: 1
    volumes:
      - scan_data:/tmp/scans
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - vuln-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: vuln-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
      VITE_API_KEY: ${API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "127.0.0.1:5174:80"
    networks:
      - vuln-net

volumes:
  postgres_data:
  redis_data:
  scan_data:

networks:
  vuln-net:
    driver: bridge
