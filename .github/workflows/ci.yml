name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * 0"  # Sunday midnight UTC — weekly security scan + dep audit

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  API_KEY: dev-api-key-change-me

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.dir }}
          path: ${{ matrix.dir }}/coverage.xml
          retention-days: 7

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit

  frontend-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check --output-format=github

  python-typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers]
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy
        run: pip install mypy==1.13.0
      - name: Install runtime deps (for type stubs)
        run: pip install -r requirements.txt
      - name: Run mypy
        run: mypy --config-file=pyproject.toml .

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run eslint
        run: npm run lint

  e2e-tests:
    needs: [python-tests, frontend-typecheck, frontend-unit-tests, frontend-build, python-lint, python-typecheck, frontend-lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env from example
        run: cp .env.example .env

      - name: Install frontend dependencies (pre-Docker — avoid root-owned node_modules)
        run: npm ci
        working-directory: frontend

      - name: Start full stack via Docker Compose
        run: docker compose -f docker-compose.yml up -d --wait

      - name: Seed E2E test data
        run: docker compose -f docker-compose.yml exec -T backend python -m scripts.seed_e2e

      - name: Install Playwright with Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright E2E tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: "true"
          BASE_URL: "http://localhost:5173"

      - name: Upload Playwright HTML report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload test results / traces (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Dump service logs (on failure)
        if: failure()
        run: |
          docker compose -f docker-compose.yml logs backend --tail=100
          docker compose -f docker-compose.yml logs frontend --tail=50
          docker compose -f docker-compose.yml logs postgres --tail=30
          docker compose -f docker-compose.yml logs worker_ip --tail=30
          docker compose -f docker-compose.yml logs worker_domain --tail=30

  docker-scan:
    needs: []
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: [backend, workers, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.dir }} image
        run: docker build -t vuln-scanner-${{ matrix.dir }}:${{ github.sha }} ${{ matrix.dir }}

      - name: Scan ${{ matrix.dir }} image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        continue-on-error: true
        with:
          image-ref: vuln-scanner-${{ matrix.dir }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.dir }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results-${{ matrix.dir }}.sarif
          category: trivy-${{ matrix.dir }}

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [python-tests, frontend-typecheck, frontend-unit-tests, frontend-build, python-lint, python-typecheck, frontend-lint, e2e-tests]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Write .env on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            # Extract password from DATABASE_URL_SYNC so POSTGRES_PASSWORD always matches
            PG_PASS=$(echo "${{ secrets.DATABASE_URL_SYNC }}" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p')
            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_URL_SYNC=${{ secrets.DATABASE_URL_SYNC }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
            CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER || 'vuln_scanner' }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB || 'vuln_scanner' }}
            API_KEY=${{ secrets.API_KEY }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            DEFAULT_REGISTER_CREDITS=${{ secrets.DEFAULT_REGISTER_CREDITS }}
            IP_SCAN_CREDIT_COST=${{ secrets.IP_SCAN_CREDIT_COST }}
            DOMAIN_SCAN_CREDIT_COST=${{ secrets.DOMAIN_SCAN_CREDIT_COST }}
            APK_SCAN_CREDIT_COST=${{ secrets.APK_SCAN_CREDIT_COST }}
            IPA_SCAN_CREDIT_COST=${{ secrets.IPA_SCAN_CREDIT_COST }}
            NVD_API_KEY=${{ secrets.NVD_API_KEY }}
            ENVEOF
            echo "POSTGRES_PASSWORD=${PG_PASS}" >> .env
            echo ".env written from GitHub Secrets"

      - name: Deploy to production
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p ${{ secrets.DEPLOY_PORT || 22 }} \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'set -e
            cd '"${{ secrets.DEPLOY_PATH }}"'
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache

            echo "=== Pre-deploy diagnostics ==="
            docker ps -a --format "{{.Names}} {{.Status}}" || true
            docker volume ls --format "{{.Name}}" | grep postgres || true
            echo "=== Bringing services down ==="
            docker compose -f docker-compose.prod.yml down --volumes
            echo "=== Remaining volumes ==="
            docker volume ls --format "{{.Name}}" | grep postgres || true

            echo "=== Starting services ==="
            if ! docker compose -f docker-compose.prod.yml up -d --wait; then
              echo "=== FAILED — dumping logs ==="
              docker logs vuln-postgres --tail=100 2>&1 || true
              docker compose -f docker-compose.prod.yml logs --tail=100 2>&1 || true
              exit 1
            fi

            docker exec vuln-backend alembic upgrade head
            echo "Deploy completed — migration at $(docker exec vuln-backend alembic current 2>/dev/null | tail -1)"'
          rm -f ~/.ssh/deploy_key
