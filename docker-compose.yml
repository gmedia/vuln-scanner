services:
  postgres:
    image: postgres:16-alpine
    container_name: vuln-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vuln_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-vuln_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vuln-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost,http://localhost:8000}
      API_KEY: ${API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - scan_data:/tmp/scans
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 15s

  worker_ip:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-ip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      NVD_API_KEY: ${NVD_API_KEY:-}
      CELERY_QUEUE: ip_scan
      CELERY_CONCURRENCY: 2
    volumes:
      - ./workers:/app
      - ./backend:/backend
      - scan_data:/tmp/scans
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker_domain:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-domain
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      CELERY_QUEUE: domain_scan
      CELERY_CONCURRENCY: 2
    volumes:
      - ./workers:/app
      - ./backend:/backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker_mobile:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-mobile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      CELERY_QUEUE: mobile_scan
      CELERY_CONCURRENCY: 1
    volumes:
      - ./workers:/app
      - ./backend:/backend
      - scan_data:/tmp/scans
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: vuln-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
      VITE_API_KEY: ${API_KEY}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "test -d node_modules || npm install; npm run dev -- --host 0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'vite' > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vuln-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  scan_data:
  frontend_node_modules:
