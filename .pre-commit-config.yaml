repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|workers)/.*\.py$
      - id: ruff-format
        files: ^(backend|workers)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/.*\.py$
        args: [backend/, --config-file=backend/pyproject.toml, --disable-error-code=type-arg, --disable-error-code=no-any-return]
        additional_dependencies:
          [fastapi==0.115.6, pydantic==2.10.3, pydantic-settings==2.7.1, sqlalchemy==2.0.36, httpx==0.28.1, types-redis==4.6.0.20241004]
        pass_filenames: false
      - id: mypy
        alias: mypy-workers
        name: mypy (workers)
        files: ^workers/.*\.py$
        args: [workers/, --config-file=workers/pyproject.toml, --disable-error-code=type-arg, --disable-error-code=no-any-return]
        additional_dependencies:
          [celery==5.4.0, pydantic==2.10.3, sqlalchemy==2.0.36, httpx==0.28.1, types-redis==4.6.0.20241004]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, ts, css, json, yaml]

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.25.1
    hooks:
      - id: eslint
        files: ^frontend/
        types_or: [javascript, ts]
        additional_dependencies:
          - eslint@^10.5.0
          - "@eslint/js@^10.0.1"
          - typescript-eslint@^8.61.1
          - eslint-plugin-react-hooks@^7.1.1
          - eslint-plugin-react-refresh@^0.5.3
