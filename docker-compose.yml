version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vuln-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vuln_scanner}
      POSTGRES_USER: ${POSTGRES_USER:-vuln_scanner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vuln_scanner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: vuln-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuln-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - scan_data:/tmp/scans
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker_ip:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-ip
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
      NVD_API_KEY: ${NVD_API_KEY:-}
    volumes:
      - ./workers:/app
      - ./backend:/backend
      - scan_data:/tmp/scans
    command: celery -A celery_app worker -Q ip_scan --concurrency=2 --loglevel=info

  worker_domain:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-domain
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
    volumes:
      - ./workers:/app
      - ./backend:/backend
    command: celery -A celery_app worker -Q domain_scan --concurrency=2 --loglevel=info

  worker_mobile:
    build:
      context: ./workers
      dockerfile: Dockerfile
    container_name: vuln-worker-mobile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      OSV_BASE_URL: ${OSV_BASE_URL:-https://api.osv.dev/v1}
    volumes:
      - ./workers:/app
      - ./backend:/backend
      - scan_data:/tmp/scans
    command: celery -A celery_app worker -Q mobile_scan --concurrency=1 --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: vuln-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: ""
      VITE_WS_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vuln-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  scan_data:
