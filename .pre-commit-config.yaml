repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|workers)/.*\.py$
      - id: ruff-format
        files: ^(backend|workers)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^backend/.*\.py$
        args: [--config-file=backend/pyproject.toml, --no-error-summary]
        additional_dependencies: [fastapi==0.115.6, pydantic==2.10.3, sqlalchemy==2.0.36, httpx==0.28.1]
        pass_filenames: false
      - id: mypy
        alias: mypy-workers
        name: mypy (workers)
        files: ^workers/.*\.py$
        args: [--config-file=workers/pyproject.toml, --no-error-summary]
        additional_dependencies: [celery==5.4.0, pydantic==2.10.3, sqlalchemy==2.0.36, httpx==0.28.1]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: debug-statements
